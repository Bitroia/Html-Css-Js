<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabuada</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <h2>Digite um número e confirme para gerar uma tabuada</h2>
    <form id="multiplication-form">
      <div class="form-control">
        <label for="number">Tabuada do:</label>
        <input type="number" name="number" id="number" placeholder="3" />
      </div>
      <div class="form-control">
        <label for="multiplicator">Tabuada do:</label>
        <input
          type="number"
          name="multiplicator"
          id="multiplicator"
          value="10"
        />
      </div>
      <input type="submit" value="calcular">
    </form>
    div.multiplication
  </body>
</html>
