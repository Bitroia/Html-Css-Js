<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Gerador de Senha</title>
  </head>
  <body>
    <h1>Crie sua conta</h1>
    <p>Registre-se para utilizar todas as funcionalidades do sistema</p>
    <div id="data-container">
      <form id="form-register">
        <label class="lbl-input">Nome</label>
        <input type="text" class="input-data" placeholder="Digite seu nome" />
        <label class="lbl-input">E-mail</label>
        <input
          type="email"
          class="input-data"
          placeholder="Digite seu e-mail"
        />
        <label class="lbl-input">Senha</label>
        <input
          type="password"
          class="input-data"
          placeholder="Digite sua senha"
        />
      </form>
      <div id="pass-confirm">
        <div id="pass-confirm-action">
          <p>
            Quer ajuda para criar uma senha segura? <a href="">Clique aqui.</a>
          </p>
          <p cl></p>
        </div>
      </div>
    </div>
  </body>
</html>
