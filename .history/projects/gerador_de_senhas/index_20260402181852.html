<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Gerador de Senha</title>
  </head>
  <body>
    <main>
        <h1>Crie sua conta</h1>
        <p>Registre-se para utilizar todas as funcionalidades do sistema</p>
        <div id="data-container">
          <form id="form-register">
            <label for="name" class="lbl-input">Nome</label>
            <input
              type="text"
              class="input-data"
              id="name"
              name="input-name"
              placeholder="Digite seu nome"
              required
            />
            <label for="email" class="lbl-input">E-mail</label>
            <input
              type="email"
              class="input-data"
              id="email"
              name="input-email"
              placeholder="Digite seu e-mail"
              required
            />
            <label for="pass" class="lbl-input">Senha</label>
            <input
              type="password"
              class="input-data"
              id="pass"
              name="input-pass"
              placeholder="Digite sua senha"
              required
            />
            <div id="pass-confirm">
              <div id="pass-confirm-action">
                <p>Quer ajuda para criar uma senha segura?</p>
                <button id="generate-pass">Clique aqui</button>
                <p id="pass-suggestion"></p>
              </div>
            </div>
            <label for="pass-confirm" class="lbl-input">Confirmação de senha</label>
            <input
              type="password"
              class="input-data"
              id="pass-confirm"
              name="input-pass-confirm"
              placeholder="Confirme a sua senha"
              required
            />
            <button type="button" class="btn-submit">Cadastrar</button>
          </form>
        </div>
    </main>
  </body>
</html>
